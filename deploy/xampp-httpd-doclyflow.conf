# =============================================================================
# Doclyflow — XAMPP Apache vhost (Windows)
# =============================================================================
# Esse arquivo transforma o Apache do XAMPP no servidor oficial do projeto
# (frontend estático + API PHP) — eliminando a necessidade de subir o
# `php -S` na :8080 ou rodar o `npm run dev` na :4321.
#
# Como usar (3 passos):
#   1. Copie este arquivo para:
#        C:\xampp\apache\conf\extra\httpd-doclyflow.conf
#   2. Abra C:\xampp\apache\conf\httpd.conf e adicione AO FINAL:
#        Include conf/extra/httpd-doclyflow.conf
#   3. Reinicie o Apache pelo painel do XAMPP (ou `httpd -k restart`).
#
# Pré-requisitos para o .htaccess de api/public/ funcionar:
#   - mod_rewrite carregado (já vem em XAMPP 8.x+)
#   - AllowOverride FileInfo ou All no <Directory> apontado (este vhost já faz)
#   - PHP carregado (LoadModule php_module, XAMPP já vem)
#
# Estrutura esperada em C:\xampp\htdocs\ (produzida por `npm run build`
# seguida de `xcopy /E /Y /I dist\client\* C:\xampp\htdocs\`):
#   htdocs\
#     api/
#       public/
#         index.php        ; front controller PHP
#         .htaccess        ; rewrite no-filename -> index.php
#     api\.env             ; lido por api/src/bootstrap.php
#     api/                 ; demais arquivos da API (não expostos)
#     index.html           ; home (Astro build)
#     login/index.html
#     dashboard/index.html
#     ... demais rotas estáticas
#     _astro/              ; bundle JS/CSS
#     favicon.svg
#
# Obs: para que o frontend chame a API corretamente, ./.env na raiz do
# projeto Astro precisa ter `PUBLIC_API_URL=http://localhost/api` antes de
# rodar `npm run build` (a variável é baked-in no bundle JS).
# =============================================================================

<VirtualHost *:80>
    ServerName localhost
    ServerAlias 127.0.0.1

    # Aponta para o build estático copiado no htdocs.
    # Se preferir outro caminho (ex.: C:\desenvolvimento\doclyflow\dist\client\),
    # troque a linha abaixo — mas copie/limpe periodicamente para evitar drift.
    DocumentRoot "C:/xampp/htdocs"

    <Directory "C:/xampp/htdocs">
        # `FileInfo` é suficiente para os RewriteRules em api/public/.htaccess.
        # Se quiser permitir Overrides totais (incluindo Options/AuthConfig),
        # troque para `AllowOverride All`.
        AllowOverride FileInfo
        # `-Indexes` impede que um diretório sem `index.html` vire lista
        # (do contrário http://localhost/api/ exporia src/, sql/, .env, etc.).
        Options -Indexes +FollowSymLinks
        Require all granted
    </Directory>

    # Bloqueia acesso a qualquer arquivo cujo nome comece com `.` em qualquer
    # profundidade (`/.env`, `/api/.env`, `/.git/...`, `/.htaccess` etc.).
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    # Bloqueia diretórios dot-prefix (htdocs/.astro/, hdots/api/.git/, etc.).
    <DirectoryMatch "/\.[^/]+">
        Require all denied
    </DirectoryMatch>

    # Logs separados do `localhost` default do XAMPP — facilita grep.
    ErrorLog  "logs/doclyflow-error.log"
    CustomLog "logs/doclyflow-access.log" combined
</VirtualHost>
